apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GSGFs7/GSGFs-blog-backend.git
    targetRevision: HEAD
    path: .config/k8s/overlays/prod
    kustomize:
      images:
        - blog-django=${REGISTRY_DOMAIN}/blog-django
        - blog-celery-worker=${REGISTRY_DOMAIN}/blog-celery-worker
        - blog-celery-beat=${REGISTRY_DOMAIN}/blog-celery-beat
        - blog-model-downloader=${REGISTRY_DOMAIN}/blog-model-downloader
        - blog-backup=${REGISTRY_DOMAIN}/blog-backup
      patches:
        - target:
            kind: Ingress
            name: blog-ingress
          patch: |-
            - op: replace
              path: /spec/rules/0/host
              value: ${BACKEND_DOMAIN}
            - op: replace
              path: /spec/tls/0/hosts/0
              value: ${BACKEND_DOMAIN}
        - target:
            kind: ClusterIssuer
            name: letsencrypt-prod
          patch: |-
            - op: replace
              path: /spec/acme/email
              value: ${ADMIN_EMAIL}
  destination:
    server: https://kubernetes.default.svc # current cluster
    namespace: blog
  syncPolicy:
    automated:
      prune: true # Automatically delete resources that no longer exist in Git
      selfHeal: true # Automatically correct back to Git status
