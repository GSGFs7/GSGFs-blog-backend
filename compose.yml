services:
  blog-django:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - hf_token
      args:
        - MODEL_NAME=${MODEL_NAME}
        - SENTENCE_TRANSFORMERS_HOME=${SENTENCE_TRANSFORMERS_HOME}
    # image: django
    container_name: blog-django
    working_dir: /app
    mem_limit: 6G
    cpus: 2
    ports:
      - "8000:8000"
    depends_on:
      - blog-postgres
      - blog-redis
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_LOGLEVEL: ${DJANGO_LOGLEVEL}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_ENGINE: ${DATABASE_ENGINE}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
    networks:
      - blog-network
    # watch 配置
    # develop:
    #   watch:
    #     - action: sync
    #       path: .
    #       target: /app
    #       ignore:
    #         - .git/
    #         - .vevn
    #         - __pycache__/
    #     - action: rebuild
    #       path: requirements.txt

  blog-postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: blog-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/
    ports:
      - "5432:5432"
    networks:
      - blog-network
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_interval: 10s

  blog-redis:
    image: redis:8-apline
    container_name: blog-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_date:/data
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  blog-prometheus:
    image: prom/prometheus:latest
    container_name: blog-prometheus
    volumes:
      - ./.config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    # ports:
    #   - "9090:9090"
    # networks:
    #   - blog-network
    network_mode: host # access service outside the container

  blog-grafana:
    image: grafana/grafana:latest
    container_name: blog-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=123456 # NOTE: change passwd
    depends_on:
      - blog-prometheus
    # ports:
    #  - "3030:3000"
    # networks:
    #   - blog-network
    network_mode: host

volumes:
  postgres_data:
  redis_date:

networks:
  blog-network:
    driver: bridge

secrets:
  hf_token:
    # You need to create this file
    file: ./hf_token.txt
