name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # manual triggering

permissions:
  contents: read
  packages: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      db:
        image: pgvector/pgvector:pg18-trixie
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: github_action_test
          POSTGRES_USER: github_action_test_user
          POSTGRES_PASSWORD: github_action_test_password
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Download model
        run: uv run scripts/download-model.py
        env:
          MODEL_NAME: google/embeddinggemma-300m
          SENTENCE_TRANSFORMERS_HOME: sentence_transformers_models
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HUGGINGFACE_HUB_TOKEN }}

      - name: Run tests
        run: uv run manage.py test
        env:
          DJANGO_SECRET_KEY: github-action-test-django-secret-key
          DATABASE_ENGINE: postgresql
          DATABASE_NAME: github_action_test
          DATABASE_USER: github_action_test_user
          DATABASE_PASSWORD: github_action_test_password
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MODEL_NAME: google/embeddinggemma-300m
          SENTENCE_TRANSFORMERS_HOME: sentence_transformers_models
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HUGGINGFACE_HUB_TOKEN }}
          API_KEY: github_action_test_API_KEY

  build:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      matrix:
        include:
          - component: django
            dockerfile: .config/k8s/containers/django.Dockerfile
            image_name: blog-django
          - component: celery-worker
            dockerfile: .config/k8s/containers/celery-worker.Dockerfile
            image_name: blog-celery-worker
          - component: celery-beat
            dockerfile: .config/k8s/containers/celery-beat.Dockerfile
            image_name: blog-celery-beat
          - component: model-downloader
            dockerfile: .config/k8s/containers/model-downloader.Dockerfile
            image_name: blog-model-downloader
          - component: backup
            dockerfile: .config/k8s/containers/backup.Dockerfile
            image_name: blog-backup
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Map registry domain to IP
        # Bypass CF CDN
        run: echo "${{ secrets.REGISTRY_IP }} ${{ secrets.REGISTRY_DOMAIN }}" | sudo tee -a /etc/hosts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_DOMAIN }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.REGISTRY_DOMAIN }}/${{ matrix.image_name }}:latest
            ${{ secrets.REGISTRY_DOMAIN }}/${{ matrix.image_name }}:${{ github.sha }}
          # Layer cache backed by the registry — speeds up incremental builds significantly
          cache-from: type=registry,ref=${{ secrets.REGISTRY_DOMAIN }}/${{ matrix.image_name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_DOMAIN }}/${{ matrix.image_name }}:buildcache,mode=max
          secrets: |
            "hf_token=${{ secrets.HUGGINGFACE_HUB_TOKEN }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    env:
      OVERLAY_DIR: .config/k8s/overlays/prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Pin image tags to current commit SHA
        # This ensures each deploy uses the exact image built in this workflow run.
        run: |
          cd ${{ env.OVERLAY_DIR }}
          kustomize edit set image \
            blog-django=${{ secrets.REGISTRY_DOMAIN }}/blog-django:${{ github.sha }} \
            blog-celery-worker=${{ secrets.REGISTRY_DOMAIN }}/blog-celery-worker:${{ github.sha }} \
            blog-celery-beat=${{ secrets.REGISTRY_DOMAIN }}/blog-celery-beat:${{ github.sha }} \
            blog-model-downloader=${{ secrets.REGISTRY_DOMAIN }}/blog-model-downloader:${{ github.sha }} \
            blog-backup=${{ secrets.REGISTRY_DOMAIN }}/blog-backup:${{ github.sha }}

      - name: Write prod secrets to overlay .env.prod
        # kustomize secretGenerator reads this file to create the blog-secrets Secret.
        # Note: static config-only vars (DEBUG, DATABASE_HOST, REDIS_HOST, etc.) stay in configmap.yaml.
        run: |
          cat > ${{ env.OVERLAY_DIR }}/.env.prod <<EOF
          DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_CSRF_TRUSTED_ORIGINS=${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}
          DATABASE_USER=${{ secrets.DATABASE_USER }}
          DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
          API_KEY=${{ secrets.API_KEY }}
          SERVER_NAME=${{ secrets.SERVER_NAME }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          BACKEND_DOMAIN=${{ secrets.BACKEND_DOMAIN }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          HUGGINGFACE_HUB_TOKEN=${{ secrets.HUGGINGFACE_HUB_TOKEN }}
          S3_ENDPOINT_URL=${{ secrets.S3_ENDPOINT_URL }}
          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          EOF

      - name: Deploy to Cluster
        env:
          BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          # 1. Ensure namespace exists
          kubectl apply -f .config/k8s/base/namespace.yaml

          # 2. Handle immutable jobs — delete before re-apply
          kubectl delete job blog-django-migrate -n blog --ignore-not-found

          # 3. Build manifests and substitute runtime variables ($BACKEND_DOMAIN, $ADMIN_EMAIL)
          kustomize build ${{ env.OVERLAY_DIR }} | envsubst | kubectl apply -f -
