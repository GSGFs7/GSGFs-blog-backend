apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: blog

resources:
  - ../../base
  - ingress.yaml
  - cluster-issuer.yaml

# In prod, images are managed by GitHub action & Argo CD
images:
  - name: blog-django
    newName: blog-django
    newTag: latest
  - name: blog-celery-worker
    newName: blog-celery-worker
    newTag: latest
  - name: blog-celery-beat
    newName: blog-celery-beat
    newTag: latest
  - name: blog-model-downloader
    newName: blog-model-downloader
    newTag: latest
  - name: blog-backup
    newName: blog-backup
    newTag: latest
