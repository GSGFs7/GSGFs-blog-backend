# k8s/base/job-backup.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: blog-postgres-db-backup
spec:
  schedule: "0 4 * * *" # every day 4:00
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid # Prevent new tasks from being started before old tasks are completed
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2 # Retry at most 2 times after failure to prevent infinite retries
      template:
        spec:
          volumes:
            - name: backup-dir
              emptyDir: { }
          containers:
            - name: blog-postgres-backup
              image: blog-backup:latest
              volumeMounts:
                - name: backup-dir
                  mountPath: /backups
              envFrom:
                - configMapRef:
                    name: blog-config
                - secretRef:
                    name: blog-secrets
              command:
                - /bin/bash
                - -c
                - |
                  set -eo pipefail
                  if [ -z "$DATABASE_HOST" ] || [ -z "$DATABASE_NAME" ]; then
                    echo "Error: DATABASE_HOST or DATABASE_NAME is not set."
                    exit 1
                  fi
                  
                  TIMESTAMP=$(date +%Y%m%d-%H%M)
                  BACKUP_FILE="/backups/blog-${TIMESTAMP}.sql.gz"
                  
                  export PGPASSWORD=$DATABASE_PASSWORD
                  echo "Starting backup for $DATABASE_NAME on $DATABASE_HOST..."
                  
                  pg_dump -h "$DATABASE_HOST" -p "${DATABASE_PORT:-5432}" -U "$DATABASE_USER" -d "$DATABASE_NAME" | gzip > "$BACKUP_FILE"
                  
                  echo "Backup created: $BACKUP_FILE ($(du -sh $BACKUP_FILE | cut -f1))"
                  
                  echo "Uploading to object storage..."
                  python3 /app/upload.py upload "$BACKUP_FILE" "$BACKUP_BUCKET" backups/
                  echo "Backup and upload completed successfully."
          restartPolicy: OnFailure
      ttlSecondsAfterFinished: 60 # 1min
