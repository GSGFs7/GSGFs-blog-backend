depends_on:
  - test

# specify an agent run the pipline which has this label
labels:
  type: builder
  # set agent env to use the label:
  #  WOODPECKER_AGENT_LABELS: type=builder

when:
  - event: [push, manual]
    branch:
      - main
      - woodpecker-test

steps:
  - name: build
    image: docker.io/library/archlinux:latest
    # SECURITY WARNING: privileged is enable, makesure you trust all for the code
    privileged: true
    environment:
      REGISTRY_DOMAIN:
        from_secret: REGISTRY_DOMAIN
      REGISTRY_IP:
        from_secret: REGISTRY_IP
      REGISTRY_CA_CERT:
        # it will case an error when too large
        from_secret: REGISTRY_CA_CERT
      REGISTRY_CLIENT_CERT:
        from_secret: REGISTRY_CLIENT_CERT
      REGISTRY_CLIENT_KEY:
        from_secret: REGISTRY_CLIENT_KEY
      #REGISTRY_USERNAME:
      #  from_secret: REGISTRY_USERNAME
      #REGISTRY_PASSWORD:
      #  from_secret: REGISTRY_PASSWORD
      HUGGINGFACE_HUB_TOKEN:
        from_secret: HUGGINGFACE_HUB_TOKEN
      REGISTRY_RETAIN_COMMITS: "20"
      REGISTRY_CLEANUP_ENABLED: "true"
      STORAGE_DRIVER: overlay
    commands:
      - |
        # 1. Install necessary tools
        pacman -Sy --noconfirm podman skopeo fuse-overlayfs curl jq ca-certificates
        
        # 2. Register private CA in system trust store
        if [ -n "$REGISTRY_CA_CERT" ]; then
          echo "$REGISTRY_CA_CERT" > /usr/share/ca-certificates/trust-source/anchors/registry-ca.crt
          update-ca-trust
          echo "System trust store updated with private CA."
        fi
        
        # 3. Setup DNS bypass for registry
        if [ -n "$REGISTRY_IP" ] && [ -n "$REGISTRY_DOMAIN" ]; then
          echo "$REGISTRY_IP $REGISTRY_DOMAIN" >> /etc/hosts
          echo "::1 $REGISTRY_DOMAIN" >> /etc/hosts
          echo "DNS bypass configured for $REGISTRY_DOMAIN."
        fi
        
        # 4. Execute build script
        chmod +x ./scripts/build-and-push.sh
        ./scripts/build-and-push.sh
